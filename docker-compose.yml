services:
  powder-hunter:
    # To build from source instead: comment 'image' and uncomment 'build'
    image: ghcr.io/seanmeyer/powder-hunter:latest
    # build: .
    container_name: powder-hunter
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - powder-hunter-data:/data
    command: ["run", "--loop"]

volumes:
  powder-hunter-data:
